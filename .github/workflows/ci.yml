name: CI Pipeline

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint HTML Files
        run: |
          npm install -g htmlhint
          htmlhint "src/frontend/**/*.html" || true

      - name: Lint CSS Files
        run: |
          npm install -g stylelint stylelint-config-standard
          echo '{"extends":"stylelint-config-standard"}' > .stylelintrc.json
          stylelint "src/frontend/**/*.css" || true

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:ci-${{ github.sha }} .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:ci-${{ github.sha }}