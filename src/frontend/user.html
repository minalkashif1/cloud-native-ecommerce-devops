<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopCloud - User Service</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">🛒 ShopCloud</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="user.html">Login</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="orders.html">Orders</a></li>
            <li><a href="notifications.html">Notifications</a></li>
        </ul>
    </nav>

    <div class="page-title">
        <h2>👤 User Service</h2>
        <p>Register or login to access your account</p>
    </div>

    <div class="form-container">
        <div class="form-box">
            <h3>Register</h3>
            <input type="text" placeholder="Full Name" />
            <input type="email" placeholder="Email Address" />
            <input type="password" placeholder="Password" />
            <button class="btn">Create Account</button>
        </div>

        <div class="form-box">
            <h3>Login</h3>
            <input type="email" placeholder="Email Address" />
            <input type="password" placeholder="Password" />
            <button class="btn">Login</button>
            <p class="note">🔐 Secured with JWT Authentication</p>
        </div>
    </div>

    <footer>
        <p>© 2025 ShopCloud | Built with Docker, Kubernetes & Jenkins</p>
    </footer>
</body>
</html>
